spring.application.name=fiscalcore-api

# Database configuration
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/fiscalcore?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:fiscalcore_user}
spring.datasource.password=${DATABASE_PASSWORD:fiscalcore_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT configuration
jwt.secret=${JWT_SECRET:change-this-secret-before-production-change-this-secret-before-production}
jwt.expiration=${JWT_EXPIRATION:3600000}

# Server configuration
server.port=${SERVER_PORT:8080}