services:
  mysql:
    image: mysql:8.4
    container_name: fiscalcore-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: fiscalcore
      MYSQL_USER: fiscalcore_user
      MYSQL_PASSWORD: fiscalcore_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - fiscalcore_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fiscalcore-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:mysql://mysql:3306/fiscalcore?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DATABASE_USERNAME: fiscalcore_user
      DATABASE_PASSWORD: fiscalcore_password
      JWT_SECRET: change-this-secret-before-production-change-this-secret-before-production
      JWT_EXPIRATION: "3600000"
      SERVER_PORT: "8080"
    ports:
      - "8080:8080"

volumes:
  fiscalcore_mysql_data:
